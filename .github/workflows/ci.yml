name: CI

on:
  push:
    branches:
      - main
      - master
      - "release/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build server
        run: go build -o /tmp/ou-ui-server ./apps/server

      - name: Build agent
        run: go build -o /tmp/ou-ui-agent ./apps/agent

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: bash -n
        run: |
          find scripts deploy -type f -name '*.sh' -print0 | xargs -0 -r bash -n

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: |
          find scripts deploy -type f -name '*.sh' -print0 | xargs -0 -r shellcheck

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - go
      - frontend
      - shell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: false
          load: false
          tags: ou-ui-web:ci

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: false
          load: false
          tags: ou-ui-server:ci

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan with Gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.2 detect \
            --source=/repo \
            --redact \
            --verbose
